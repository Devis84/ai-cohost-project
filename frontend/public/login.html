<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family:-apple-system;
  background:#f7f7f7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:white;
  padding:30px;
  border-radius:16px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  text-align:center;
}

h2 {
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:12px;
  font-size:14px;
}

button {
  width:100%;
  padding:12px;
  background:black;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:disabled {
  opacity:0.6;
}

.status {
  margin-top:15px;
  font-size:14px;
}

.success {
  color:green;
}

.error {
  color:red;
}

.loader {
  display:inline-block;
  width:14px;
  height:14px;
  border:2px solid #ccc;
  border-top:2px solid black;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-right:6px;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <input id="email" placeholder="Email" />

  <button id="btn" onclick="login()">Send Magic Link</button>

  <div id="status" class="status"></div>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://mhmebkakdmwzqgteywyd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1obWVia2FrZG13enFndGV5d3lkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxODg3ODksImV4cCI6MjA4ODc2NDc4OX0.85TrSsRElJ5-30BlUzfOLLymHHQKEbXuYr-4arpOzEY"
);

async function login() {
  const email = document.getElementById("email").value;
  const status = document.getElementById("status");
  const btn = document.getElementById("btn");

  status.innerHTML = '<span class="loader"></span>Sending...';
  status.className = "status";

  btn.disabled = true;

  const { error } = await supabaseClient.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: "http://localhost:3000/login.html"
    }
  });

  if (error) {
    status.innerHTML = "❌ " + error.message;
    status.className = "status error";
    btn.disabled = false;
  } else {
    status.innerHTML = "✅ Email sent (check spam)";
    status.className = "status success";
  }
}

// 🔥 LOGIN AUTO
supabaseClient.auth.onAuthStateChange((event, session) => {

  if (event === "SIGNED_IN") {
    window.location.href = "/host.html";
  }

});
</script>

</body>
</html>
