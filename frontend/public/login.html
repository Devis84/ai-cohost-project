<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 🔥 BYPASS LOGIN
if (!window.APP_CONFIG.AUTH_ENABLED) {
  window.location.href = "/host.html";
}
</script>

<style>
body {
  font-family:-apple-system;
  background:#f7f7f7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:white;
  padding:30px;
  border-radius:16px;
  width:320px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input {
  width:100%;
  padding:12px;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:12px;
  background:black;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Login</h2>
  <input id="email" placeholder="Email" />
  <button onclick="login()">Send Magic Link</button>
  <p id="status"></p>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://mhmebkakdmwzqgteywyd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

async function login() {
  const email = document.getElementById("email").value;
  document.getElementById("status").innerText = "Sending...";

  await supabase.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: "http://localhost:3000/login.html"
    }
  });

  document.getElementById("status").innerText = "Email sent";
}

supabase.auth.onAuthStateChange((event) => {
  if (event === "SIGNED_IN") {
    window.location.href = "/host.html";
  }
});
</script>

</body>
</html>
