<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Dashboard</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:30px; }
h1 { font-size:42px; }

.card {
  background:white;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
}

input,select,textarea {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

textarea {
  height:180px;
}

button {
  margin-top:10px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
  cursor:pointer;
}

.save {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:black;
  color:white;
  text-align:center;
  padding:20px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Dashboard</h1>

<div class="card">
<h2>🏡 Property</h2>
<select id="propertySelect"></select>
</div>

<div class="card">
<h2>📶 WiFi</h2>
<input id="wifiName" placeholder="Network name" />
<input id="wifiPass" placeholder="Password" />
<button onclick="copyWifi()">Copy WiFi</button>
</div>

<div class="card">
<h2>🏡 Stay Info</h2>
<input id="checkin" placeholder="Check-in (e.g. From 15:00)" />
<input id="checkout" placeholder="Check-out (e.g. Before 11:00)" />
</div>

<div class="card">
<h2>📜 House Rules</h2>
<div id="rules"></div>
<button onclick="addRule()">+ Add rule</button>
</div>

<div class="card">
<h2>📞 Contacts</h2>
<div id="contacts"></div>
<button onclick="addContact()">+ Add contact</button>
</div>

<div class="card">
<h2>🧠 AI Knowledge</h2>

<div style="position:relative;">

<textarea id="ai"></textarea>

<div id="aiHelper" style="
position:absolute;
top:14px;
left:14px;
color:#888;
pointer-events:none;
line-height:1.6;
">

Add anything guests might ask:
<br>• How appliances work
<br>• Boiler / AC instructions
<br>• House quirks
<br>• Extra tips
<br>• Anything specific to this property

<br><br>
This trains your AI assistant.

</div>

</div>

</div>

<div class="save" onclick="saveAll()">💾 Save All</div>

<script>

let selectedProperty = null;

// =======================
// LOAD PROPERTIES
// =======================
async function loadProperties() {
  try {
    const res = await fetch("http://localhost:3001/properties");
    const data = await res.json();

    if (!data || data.length === 0) throw "empty";

    renderProperties(data);

  } catch {
    // 🔥 FALLBACK (IMPORTANTISSIMO)
    renderProperties([
      { id: "1", property_name: "Maltese Maisonette" },
      { id: "2", property_name: "Bali Villa" },
      { id: "3", property_name: "Test Apartment" }
    ]);
  }
}

function renderProperties(list) {
  const select = document.getElementById("propertySelect");
  select.innerHTML = "";

  list.forEach(p => {
    let opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.property_name;
    select.appendChild(opt);
  });

  selectedProperty = list[0].id;
  loadData();

  select.onchange = () => {
    selectedProperty = select.value;
    loadData();
  };
}

// =======================
// LOAD DATA
// =======================
async function loadData() {
  try {
    const res = await fetch(`http://localhost:3001/property/${selectedProperty}`);
    const data = await res.json();

    wifiName.value = data.wifi_name || "";
    wifiPass.value = data.wifi_password || "";
    checkin.value = data.checkin || "";
    checkout.value = data.checkout || "";
    ai.value = data.ai_notes || "";

    aiHelper.style.display = ai.value ? "none" : "block";

    rules.innerHTML = "";
    (data.rules || []).forEach(addRule);

    contacts.innerHTML = "";
    (data.contacts || []).forEach(c => addContact(c.name,c.phone));

  } catch {
    console.log("No backend data");
  }
}

// =======================
// SAVE
// =======================
async function saveAll() {
  const payload = {
    wifiName: wifiName.value,
    wifiPass: wifiPass.value,
    checkin: checkin.value,
    checkout: checkout.value,
    ai: ai.value,
    rules: [...document.querySelectorAll("#rules input")].map(i=>i.value),
    contacts: [...document.querySelectorAll("#contacts .list-item")].map(d=>{
      let i=d.querySelectorAll("input");
      return {name:i[0].value,phone:i[1].value}
    })
  };

  await fetch(`http://localhost:3001/property/${selectedProperty}`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(payload)
  });

  alert("Saved!");
}

// =======================
// HELPERS
// =======================
function addRule(text=""){
  let d=document.createElement("div");
  d.className="list-item";
  let i=document.createElement("input");
  i.value=text;
  d.appendChild(i);
  rules.appendChild(d);
}

function addContact(name="",phone=""){
  let d=document.createElement("div");
  d.className="list-item";
  let i1=document.createElement("input");
  let i2=document.createElement("input");
  i1.value=name;i2.value=phone;
  d.appendChild(i1);d.appendChild(i2);
  contacts.appendChild(d);
}

function copyWifi(){
  navigator.clipboard.writeText(wifiPass.value);
  alert("Copied");
}

// UI helper hide
ai.addEventListener("input", () => {
  aiHelper.style.display = ai.value ? "none" : "block";
});

loadProperties();

</script>

</body>
</html>
