<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f6f6f6;
      padding: 30px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .card {
      background: #ffffff;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .card h2 {
      margin-bottom: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    textarea {
      height: 100px;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
    }

    .secondary {
      background: #eee;
      color: black;
    }
  </style>
</head>

<body>

<h1>Dashboard</h1>

<div class="card">
  <h2>🏡 Property</h2>
  <input value="Maltese Maisonette">
</div>

<div class="card">
  <h2>📶 WiFi</h2>
  <input placeholder="Network name">
  <input placeholder="Password">
  <button>Copy WiFi</button>
</div>

<div class="card">
  <h2>🌴 Stay Info</h2>
  <input placeholder="Check-in (e.g. From 15:00)">
  <input placeholder="Check-out (e.g. Before 11:00)">
</div>

<div class="card">
  <h2>📞 Contacts</h2>
  <button class="secondary">+ Add contact</button>
</div>

<div class="card">
  <h2>📜 House Rules</h2>
  <button class="secondary">+ Add rule</button>
</div>

<div class="card">
  <h2>📝 Property Description</h2>
  <textarea placeholder="Paste your Airbnb description here..."></textarea>
  <button>Auto-fill with AI</button>
</div>

<div class="card">
  <h2>✨ Amenities</h2>
  <textarea placeholder="Paste amenities from Airbnb"></textarea>
  <button>Extract amenities</button>
</div>

<div class="card">
  <h2>🧠 AI Knowledge</h2>
  <textarea placeholder="Add anything guests might ask:
- How appliances work
- Boiler / AC
- House quirks
- Extra tips
- Anything specific to this property

This trains your AI assistant."></textarea>
</div>

<!-- TOGGLE (SEPARATO, NON TOCCA LA DASHBOARD) -->
<script src="dev-toggle.js"></script>

</body>
</html>
