<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Co-Host Dashboard</title>

<style>
body { font-family:-apple-system; background:#f7f7f7; padding:40px; }
h1 { font-size:48px; }

.card {
  background:white;
  padding:25px;
  border-radius:16px;
  margin-bottom:25px;
}

.title {
  font-size:22px;
  font-weight:bold;
  margin-bottom:15px;
}

input, textarea, select {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:10px;
}

textarea { height:140px; }

button {
  background:black;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:10px;
  cursor:pointer;
}

.small-btn {
  background:#eee;
  color:black;
}

.chip {
  display:inline-block;
  background:#eee;
  padding:6px 12px;
  border-radius:20px;
  margin:4px;
}
</style>
</head>

<body>

<h1>Dashboard</h1>

<!-- PROPERTY -->
<div class="card">
  <div class="title">🏡 Property</div>
  <select>
    <option>Maltese Maisonette</option>
    <option>Bali Villa</option>
    <option>Lake House</option>
  </select>
</div>

<!-- WIFI -->
<div class="card">
  <div class="title">📶 WiFi</div>
  <input placeholder="Network name">
  <input placeholder="Password">
  <button>Copy WiFi</button>
</div>

<!-- STAY INFO -->
<div class="card">
  <div class="title">🌴 Stay Info</div>
  <input placeholder="Check-in (e.g. From 15:00)">
  <input placeholder="Check-out (e.g. Before 11:00)">
</div>

<!-- CONTACTS -->
<div class="card">
  <div class="title">📞 Contacts</div>
  <button class="small-btn">+ Add contact</button>
</div>

<!-- HOUSE RULES -->
<div class="card">
  <div class="title">📜 House Rules</div>
  <button class="small-btn">+ Add rule</button>
</div>

<!-- 🔥 NEW: PROPERTY DESCRIPTION -->
<div class="card">
  <div class="title">📝 Property Description</div>

  <textarea id="descriptionInput"
  placeholder="Paste your Airbnb description here..."></textarea>

  <button onclick="runAI()">Auto-fill with AI</button>

  <pre id="aiOutput"></pre>
</div>

<!-- 🔥 NEW: AMENITIES -->
<div class="card">
  <div class="title">✨ Amenities</div>

  <textarea id="amenitiesInput"
  placeholder="Paste amenities from Airbnb"></textarea>

  <button onclick="extractAmenities()">Extract amenities</button>

  <div id="amenitiesOutput"></div>
</div>

<!-- AI KNOWLEDGE -->
<div class="card">
  <div class="title">🧠 AI Knowledge</div>

  <textarea placeholder="Add anything guests might ask:
- How appliances work
- Boiler / AC
- House quirks
- Extra tips
- Anything specific to this property

This trains your AI assistant."></textarea>
</div>

<script>

function extractAmenities() {
  const input = document.getElementById("amenitiesInput").value;
  const output = document.getElementById("amenitiesOutput");
  output.innerHTML = "";

  input.split(/\n|,/).forEach(item => {
    const clean = item.trim();
    if (!clean) return;

    const chip = document.createElement("div");
    chip.className = "chip";
    chip.innerText = clean;
    output.appendChild(chip);
  });
}

async function runAI() {
  const text = document.getElementById("descriptionInput").value;

  const res = await fetch("http://localhost:3001/ai/parse-description", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  document.getElementById("aiOutput").innerText = data.result;
}

</script>

</body>
</html>
