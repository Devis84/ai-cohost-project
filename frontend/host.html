<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
      padding: 30px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    h2 {
      margin-bottom: 10px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    .helper {
      color: #777;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .list-item {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .save {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: black;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 18px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<h1>Dashboard</h1>

<div class="card">
  <h2>🏡 Property</h2>
  <select id="propertySelect"></select>
</div>

<div class="card">
  <h2>📶 WiFi</h2>
  <input id="wifiName" placeholder="Network name" />
  <input id="wifiPass" placeholder="Password" />
  <button onclick="copyWifi()">Copy WiFi</button>
</div>

<div class="card">
  <h2>🏡 Stay Info</h2>
  <input id="checkin" placeholder="Check-in (e.g. From 15:00)" />
  <input id="checkout" placeholder="Check-out (e.g. Before 11:00)" />
</div>

<div class="card">
  <h2>📜 House Rules</h2>
  <div id="rules"></div>
  <button onclick="addRule()">+ Add rule</button>
</div>

<div class="card">
  <h2>📞 Contacts</h2>
  <div id="contacts"></div>
  <button onclick="addContact()">+ Add contact</button>
</div>

<div class="card">
  <h2>🧠 AI Knowledge</h2>

  <div class="helper">
    Add anything guests might ask:<br>
    • How appliances work<br>
    • Boiler / AC instructions<br>
    • House quirks<br>
    • Extra tips<br>
    • Anything specific to this property<br><br>
    This trains your AI assistant.
  </div>

  <textarea id="ai"></textarea>
</div>

<div class="save" onclick="saveAll()">💾 Save All</div>

<script>

let properties = [
  { id: "1", name: "Maltese Maisonette" },
  { id: "2", name: "Bali Villa" },
  { id: "3", name: "Rome Apartment" }
];

let selectedProperty = "1";

function init() {
  const select = document.getElementById("propertySelect");

  properties.forEach(p => {
    let option = document.createElement("option");
    option.value = p.id;
    option.textContent = p.name;
    select.appendChild(option);
  });

  select.addEventListener("change", (e) => {
    selectedProperty = e.target.value;
    loadData();
  });

  loadData();
}

function copyWifi() {
  let pass = document.getElementById("wifiPass").value;
  navigator.clipboard.writeText(pass);
  alert("Copied!");
}

function addRule(text = "") {
  let container = document.getElementById("rules");

  let div = document.createElement("div");
  div.className = "list-item";

  let input = document.createElement("input");
  input.value = text;

  div.appendChild(input);
  container.appendChild(div);
}

function addContact(name = "", phone = "") {
  let container = document.getElementById("contacts");

  let div = document.createElement("div");
  div.className = "list-item";

  let input1 = document.createElement("input");
  input1.placeholder = "Name";
  input1.value = name;

  let input2 = document.createElement("input");
  input2.placeholder = "Phone";
  input2.value = phone;

  div.appendChild(input1);
  div.appendChild(input2);

  container.appendChild(div);
}

function loadData() {
  let data = JSON.parse(localStorage.getItem(selectedProperty)) || {};

  document.getElementById("wifiName").value = data.wifiName || "";
  document.getElementById("wifiPass").value = data.wifiPass || "";
  document.getElementById("checkin").value = data.checkin || "";
  document.getElementById("checkout").value = data.checkout || "";
  document.getElementById("ai").value = data.ai || "";

  document.getElementById("rules").innerHTML = "";
  (data.rules || []).forEach(addRule);

  document.getElementById("contacts").innerHTML = "";
  (data.contacts || []).forEach(c => addContact(c.name, c.phone));
}

function saveAll() {
  let data = {
    wifiName: document.getElementById("wifiName").value,
    wifiPass: document.getElementById("wifiPass").value,
    checkin: document.getElementById("checkin").value,
    checkout: document.getElementById("checkout").value,
    ai: document.getElementById("ai").value,
    rules: [...document.querySelectorAll("#rules input")].map(i => i.value),
    contacts: [...document.querySelectorAll("#contacts .list-item")].map(div => {
      let inputs = div.querySelectorAll("input");
      return { name: inputs[0].value, phone: inputs[1].value };
    })
  };

  localStorage.setItem(selectedProperty, JSON.stringify(data));

  alert("Saved!");
}

init();

</script>

</body>
</html>
